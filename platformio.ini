; Tremor Suppression Glove — PlatformIO project config

[env:stm32f401]
platform = ststm32
board = blackpill_f401cc
framework = stm32cube
build_flags =
    -DHAPTIC_DRV2605L
    -DUSE_HAL_DRIVER
    -DSTM32F401xC
    -Ifirmware/include
    -Ifirmware/include/hal
build_src_filter =
    +<firmware/src/>
    -<firmware/src/hal/mock/>

[env:native_test]
platform = native
test_framework = unity
build_flags =
    -DNATIVE_TEST
    -DHAPTIC_MOCK
    -std=c11
    -Wall
    -Wextra
    -Ifirmware/include
    -Ifirmware/include/hal
    -lm
build_src_filter =
    +<firmware/src/ring_buffer.c>
    +<firmware/src/filters.c>
    +<firmware/src/tremor.c>
    +<firmware/src/control.c>
    +<firmware/src/telemetry.c>
    +<firmware/src/hal/mock/>
test_build_src_filter =
    +<firmware/test/>
