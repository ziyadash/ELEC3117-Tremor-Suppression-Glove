; Tremor Suppression Glove — PlatformIO project config

[env:stm32f401]
platform = ststm32
board = blackpill_f401cc
framework = stm32cube
build_flags =
    -DHAPTIC_DRV2605L
    -DUSE_HAL_DRIVER
    -DSTM32F401xC
build_src_filter =
    +<*>
    -<hal/mock/>

[env:native_test]
platform = native
test_framework = unity
build_flags =
    -DNATIVE_TEST
    -DHAPTIC_MOCK
    -std=c11
    -Wall
    -Wextra
    -lm
; Include src/ files in test builds; #ifndef NATIVE_TEST guards exclude hardware drivers
build_src_filter = +<*>
test_build_src = yes
